name: "Update Zammad version and dependency charts (patch and minor only)"

sources:
  zammad:
    kind: dockerimage
    spec:
      image: "zammad/zammad-docker-compose"
      architecture: "linux/amd64"
      tagfilter: "^7\\.0\\.\\d-\\d{4}"
  elasticsearch:
    kind: dockerimage
    spec:
      image: "elasticsearch"
      architecture: "linux/amd64"
      versionfilter:
        kind: "semver"
        pattern: "9.x.x"
  memcached:
    kind: dockerimage
    spec:
      image: "memcached"
      architecture: "linux/amd64"
      versionfilter:
        kind: "semver"
        pattern: "1.x.x"
  postgresql:
    kind: dockerimage
    spec:
      image: "postgres"
      architecture: "linux/amd64"
      versionfilter:
        kind: "semver"
        pattern: "17.x.x"
  redis:
    kind: dockerimage
    spec:
      image: "redis"
      architecture: "linux/amd64"
      versionfilter:
        kind: "semver"
        pattern: "8.x.x"

conditions: {}

targets:
  zammad:
    # we can't use yaml because it breaks our file structure
    kind: file
    sourceid: zammad
    spec:
      file: docker-compose.yml
      matchpattern: \${VERSION:-(.*)\}
      replacepattern: ${VERSION:-{{ source `zammad` }}}
  zammad-env-dist:
    # we can't use yaml because it breaks our file structure
    kind: file
    sourceid: zammad
    spec:
      file: .env.dist
      matchpattern: ' VERSION=(\d+\.\d+.\d+.*)'
      replacepattern: ' VERSION={{ source `zammad` }}'
  elasticsearch:
    kind: file
    sourceid: elasticsearch
    spec:
      file: docker-compose.yml
      matchpattern: ELASTICSEARCH_VERSION:-(.*)\}
      replacepattern: ELASTICSEARCH_VERSION:-{{ source `elasticsearch`}}}
  elasticsearch-env-dist:
    kind: file
    sourceid: elasticsearch
    spec:
      file: .env.dist
      matchpattern: ELASTICSEARCH_VERSION=(.*)
      replacepattern: ELASTICSEARCH_VERSION={{ source `elasticsearch`}}
  memcached:
    kind: file
    sourceid: memcached
    spec:
      file: docker-compose.yml
      matchpattern: MEMCACHE_VERSION:-(.*)-alpine\}
      replacepattern: MEMCACHE_VERSION:-{{ source `memcached` }}-alpine}
  memcached-env-dist:
    kind: file
    sourceid: memcached
    spec:
      file: .env.dist
      matchpattern: MEMCACHE_VERSION=(.*)-alpine
      replacepattern: MEMCACHE_VERSION={{ source `memcached` }}-alpine
  postgresql:
    kind: file
    sourceid: postgresql
    spec:
      file: docker-compose.yml
      matchpattern: POSTGRES_VERSION:-(.*)-alpine\}
      replacepattern: POSTGRES_VERSION:-{{ source `postgresql` }}-alpine}
  postgresql-env-dist:
    kind: file
    sourceid: postgresql
    spec:
      file: .env.dist
      matchpattern: POSTGRES_VERSION=(.*)-alpine
      replacepattern: POSTGRES_VERSION={{ source `postgresql` }}-alpine
  redis:
    kind: file
    sourceid: redis
    spec:
      file: docker-compose.yml
      matchpattern: REDIS_VERSION:-(.*)-alpine\}
      replacepattern: REDIS_VERSION:-{{ source `redis` }}-alpine}
  redis-env-dist:
    kind: file
    sourceid: redis
    spec:
      file: .env.dist
      matchpattern: REDIS_VERSION=(.*)-alpine
      replacepattern: REDIS_VERSION={{ source `redis` }}-alpine

scms:
  zammad-docker-compose:
    kind: "github"
    spec:
      # user: "user"
      # email: "updatecli@example."
      owner: "zammad"
      repository: "zammad-docker-compose"
      token: '{{ requiredEnv "UPDATECLI_GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "UPDATECLI_GITHUB_ACTOR" }}'
      branch: "main"

actions:
  github:
    kind: github/pullrequest
    scmid: zammad-docker-compose
    spec:
      automerge: false
      title: "Patch-level image updates"
      assignees:
        - mgruner
      labels:
        - "dependencies"